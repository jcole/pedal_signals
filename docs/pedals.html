<!-- Unfurl card for Slack/iMessage/etc. Absolute URLs — a crawler has no page
     base. Shares og.png with the demo; the catalog is a way in, not its own pitch. -->

<!-- The whole catalog on one page, which the demo can't be (one pedal at a time,
     its picker only shows a name once opened). All lit page, no rig — every row
     points at the demo. -->
<article id="cat">
  <header class="cathdr">
    <a class="catlink" href="./">← back to the bench</a>
    <h1>The pedal families, and how the pedals differ</h1>
    <!-- No counts: everything below is rendered from the catalog, so a number here
         is the one thing a new pedal would make wrong. -->
    <p class="catlede">Grouped by the mechanism behind them: the pedal you know
    by name is an instance of one.
    Pick any row to open it on the bench — you'll get its charts, its knobs, and
    the note running through it.</p>
  </header>
  <div id="catlist"></div>
</article>

<script type="module">
  import { mountCatalog } from "./js/ui/catalog.js";
  import clipping from "./js/ui/clipping.js";
  import delay from "./js/ui/delay.js";
  import modulation from "./js/ui/modulation.js";

  // Same list and order as the demo's EFFECTS — one catalog, read twice.
  mountCatalog(document.getElementById("catlist"), [clipping, delay, modulation]);
</script>
