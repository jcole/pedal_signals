<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pedal demo</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="./css/styles.css">

<!-- One picker for the whole catalog, and the family's explanation on one line.
     Both switchers used to live here in some form — a family nav on this row, a
     pedal segment down in the PEDAL column's label. That split asked people to
     know the family before they could find the pedal, which is backwards: the
     pedal is the thing they came for, the family is what we're teaching them.
     Now the family is a heading inside the picker's list, so it's learned on the
     way past rather than demanded up front. -->
<div id="bar">
  <div class="pickhead">
    <span class="barlabel">pedal</span>
    <div id="pedalpick"></div>
    <div id="transport">
      <button id="play" title="start audio" aria-label="start audio"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg></button>
    </div>
  </div>
  <div id="lede" style="display:none">
    <p class="op"><strong>The math:</strong> <b id="lformula"></b> — <span id="lformulanote"></span></p>
    <p class="klassline"><strong>Class:</strong> <span id="lklass"></span></p>
    <p class="oneliner"><strong>What it does:</strong> <span id="loneliner"></span></p>
  </div>
</div>

<!-- The rig — charts and the knobs under them — is one object, so it gets one
     surface. The tray is what keeps the dark panels from butting straight up
     against the white page; it also draws the line the lesson prose sits below. -->
<div id="rig">
<div id="grid">
  <!-- The arrows hang off the label bars, not the charts: INPUT → PEDAL → OUTPUT
       is the signal chain, and the label row is the only row where all three
       columns line up. Pinned to a chart they'd have to guess a height, and the
       output column stacks two of them — there's no one right answer there. -->
  <div class="grp">Input</div>
  <div class="grp flowarr">Pedal</div>
  <div class="grp flowarr">Output</div>
  <div class="panel" id="inpanel">
    <h3><span class="nar">your signal</span><span class="tech" id="inh3"></span></h3>
    <canvas data-c="input"></canvas>
  </div>
  <div class="panel">
    <h3><span class="nar" id="centernar"></span><span class="tech" id="centertech"></span></h3>
    <canvas data-c="center"></canvas>
  </div>
  <div class="stack">
    <div class="panel">
      <h3><span class="nar" id="outnar"></span><span class="tech">time · <span class="dry">in</span> vs <span class="wet">out</span></span></h3>
      <canvas data-c="time"></canvas>
    </div>
    <div class="dual" id="dualtxt"></div>
    <div class="panel"><h3><span class="nar" id="specnar"></span><span class="tech">spectrum · <span class="dry">in</span> vs <span class="wet">out</span> (dB)</span></h3><canvas data-c="spec"></canvas></div>
  </div>
</div>

<div id="controls">
  <div class="ctlcol">
    <div class="ctl">
      <span class="seg">
        <button class="srcbtn active" data-src="sine">sine</button>
        <button class="srcbtn" data-src="guitar" disabled>guitar ⏳</button>
      </span>
      <button id="replay" disabled title="restart the note from the pluck">↻ pluck</button>
    </div>
    <div class="ctl">vol <input id="vin" type="range" min="0" max="1" step="0.01" value="0"><output id="vino">0.00</output></div>
  </div>
  <div class="ctlcol" id="centerctls"></div>
  <div class="ctlcol">
    <div class="ctl">vol <input id="vout" type="range" min="0" max="1" step="0.01" value="0.8"><output id="vouto">0.80</output></div>
  </div>
  <!-- both hints span the columns: the vol one is about the sliders on either
       side of them, and the credit is about the guitar button in the first -->
  <p class="hint ctlhint" id="volhint">the vol sliders blend in vs out</p>
  <p class="hint ctlhint" id="gcredit" style="display:none">
    guitar input: a clean Stratocaster A3 (bridge pickup) from
    <a href="https://egfxset.github.io/">EGFxSet</a> — Pedroza, Meza &amp; Roman,
    ISMIR 2022. CC&nbsp;BY&nbsp;4.0.
  </p>
</div>
</div>

<section id="lesson" style="display:none">
  <div class="lesson-cols">
    <div class="col">
      <div id="lbody"></div>
    </div>
    <div class="col" id="lasidewrap">
      <h3 id="lasidetitle"></h3>
      <div id="lasidebody"></div>
    </div>
  </div>
</section>

<script type="module">
  import { mount, selectPedal } from "./js/ui/harness.js";
  import { mountPicker } from "./js/ui/picker.js";
  import clipping from "./js/ui/clipping.js";
  import delay from "./js/ui/delay.js";
  import modulation from "./js/ui/modulation.js";

  // Every pedal family's view, keyed by its `id` — the heading it gets in the
  // picker. Add a new family here and it shows up in the picker and becomes
  // linkable, no other page changes needed.
  const EFFECTS = [clipping, delay, modulation];

  // The URL names a pedal and nothing else. Pedal ids are unique across the whole
  // catalog (that's what PEDALS in pedals/index.js keys on), so a pedal names its
  // own family — and since the picker is one list over that catalog, picking a
  // family without a pedal isn't a place you can be. May be absent or wrong: an id
  // nobody recognizes falls back rather than failing.
  const asked = () => new URLSearchParams(location.search).get("pedal");
  const urlFor = (pedal) => `?pedal=${pedal}`;
  const viewFor = (pedal) =>
    EFFECTS.find((v) => v.pedals.some((p) => p.id === pedal)) ?? EFFECTS[0];

  // A pick pushes, so back undoes it. Landing on a family that's already up (back
  // across a pedal pick, or a pick within the family) moves the labels and knobs
  // only — remounting would rebuild the family's audio chain under a note that's
  // still playing, to arrive at the same place.
  let current = null;
  function show(v, pedalId) {
    const p = v.pedals.find((x) => x.id === pedalId) ?? v.pedals[0];
    picker.select(p.id);
    if (v.id === current) {
      selectPedal(p.id);
      return;
    }
    current = v.id;
    mount(v, { pedal: p.id });
  }

  const picker = mountPicker(document.getElementById("pedalpick"), {
    families: EFFECTS,
    onPick: (pedal) => {
      history.pushState(null, "", urlFor(pedal));
      show(viewFor(pedal), pedal);
    },
  });

  addEventListener("popstate", () => {
    const pedal = asked(); // back/forward
    show(viewFor(pedal), pedal);
  });
  show(viewFor(asked()), asked());
</script>
