<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pedal demo</title>
<link rel="stylesheet" href="./css/styles.css">

<!-- The family switcher and the family's explanation on one line. The pedal
     switcher isn't here: it lives in the PEDAL column's label, on the charts it
     drives, and that column's headline says what the chosen pedal does. -->
<div id="bar">
  <div class="pickhead">
    <span class="barlabel">pedal family</span>
    <nav id="effnav" class="seg"></nav>
    <div id="transport">
      <button id="play" title="start audio" aria-label="start audio"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg></button>
    </div>
  </div>
  <div id="lede" style="display:none">
    <p class="op"><strong>The math:</strong> <b id="lformula"></b> — <span id="lformulanote"></span></p>
    <p class="klassline"><strong>Class:</strong> <span id="lklass"></span></p>
    <p class="oneliner"><strong>What it does:</strong> <span id="loneliner"></span></p>
  </div>
</div>

<div id="grid">
  <div class="grp">Input</div>
  <div class="grp grp-pedal">Pedal<span id="pedpicker" class="seg"></span></div>
  <div class="grp">Output</div>
  <div class="panel" id="inpanel">
    <h3><span class="nar">your signal</span><span class="tech" id="inh3"></span></h3>
    <canvas data-c="input"></canvas>
  </div>
  <div class="panel flowarr">
    <h3><span class="nar" id="centernar"></span><span class="tech" id="centertech"></span></h3>
    <canvas data-c="center"></canvas>
  </div>
  <div class="stack flowarr">
    <div class="panel">
      <h3><span class="nar" id="outnar"></span><span class="tech">time · <span class="dry">in</span> vs <span class="wet">out</span></span></h3>
      <canvas data-c="time"></canvas>
    </div>
    <div class="dual" id="dualtxt"></div>
    <div class="panel"><h3><span class="nar" id="specnar"></span><span class="tech">spectrum · <span class="dry">in</span> vs <span class="wet">out</span> (dB)</span></h3><canvas data-c="spec"></canvas></div>
  </div>
</div>

<div id="controls">
  <div class="ctlcol">
    <div class="ctl">
      <span class="seg">
        <button class="srcbtn active" data-src="sine">sine</button>
        <button class="srcbtn" data-src="guitar" disabled>guitar ⏳</button>
      </span>
      <button id="replay" disabled title="restart the note from the pluck">↻ pluck</button>
    </div>
    <div class="ctl">vol <input id="vin" type="range" min="0" max="1" step="0.01" value="0"><output id="vino">0.00</output></div>
  </div>
  <div class="ctlcol" id="centerctls"></div>
  <div class="ctlcol">
    <div class="ctl">vol <input id="vout" type="range" min="0" max="1" step="0.01" value="0.8"><output id="vouto">0.80</output></div>
  </div>
  <!-- spans the two vol sliders it's about: input's in the first column, output's
       in the third -->
  <p class="hint" id="volhint">the vol sliders blend in vs out</p>
</div>

<section id="lesson" style="display:none">
  <div class="lesson-cols">
    <div class="col">
      <div id="lbody"></div>
    </div>
    <div class="col" id="lasidewrap">
      <h3 id="lasidetitle"></h3>
      <div id="lasidebody"></div>
    </div>
  </div>
</section>

<footer id="gcredit" style="display:none">
  guitar input: a clean Stratocaster A3 (bridge pickup) from
  <a href="https://egfxset.github.io/">EGFxSet</a> — Pedroza, Meza &amp; Roman,
  ISMIR 2022. CC&nbsp;BY&nbsp;4.0.
</footer>

<script type="module">
  import { mount, selectPedal } from "./js/ui/harness.js";
  import clipping from "./js/ui/clipping.js";
  import delay from "./js/ui/delay.js";
  import modulation from "./js/ui/modulation.js";

  // Every pedal family's view, keyed by its `id` — also its ?effect= value and
  // its nav link's label. Add a new family here and it shows up in the nav and
  // becomes linkable, no other page changes needed.
  const EFFECTS = [clipping, delay, modulation];

  // The URL is the address of what you're looking at, so it carries both
  // switchers: ?effect= names the family, ?pedal= the pedal within it. Either may
  // be absent (a bare / opens the first family's first pedal) or wrong — an id
  // nobody recognizes falls back rather than failing.
  const viewFor = (id) => EFFECTS.find((v) => v.id === id) ?? EFFECTS[0];
  const asked = () => new URLSearchParams(location.search);
  const urlFor = (effect, pedal) =>
    `?effect=${effect}` + (pedal ? `&pedal=${pedal}` : "");

  // The nav entries stay real links — right-click, ⌘-click and copy-link all keep
  // working, and ?effect= URLs still load cold, since the query is only ever read
  // by this script (a static host serves index.html either way). A plain left
  // click is handled here instead: pushState swaps the URL, mount() swaps the
  // family, and neither costs a reload.
  const nav = document.getElementById("effnav");
  const links = EFFECTS.map((v) => {
    const a = document.createElement("a");
    a.href = urlFor(v.id); // the family, at whichever pedal it opens on
    a.textContent = v.navLabel;
    a.className = "navbtn";
    a.onclick = (e) => {
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();
      if (v.id === current) return;
      history.pushState(null, "", a.href);
      show(v);
    };
    nav.appendChild(a);
    return a;
  });

  // Both switchers push: they look alike and they mean alike, so back undoes
  // either one. Landing on a family that's already up (back across a pedal pick)
  // moves the picker only — remounting would rebuild the family's audio chain
  // under a note that's still playing, to arrive at the same place.
  let current = null;
  function show(v, pedal) {
    links.forEach((a, i) => {
      a.classList.toggle("active", EFFECTS[i].id === v.id);
    });
    if (v.id === current) {
      selectPedal(pedal);
      return;
    }
    current = v.id;
    mount(v, {
      pedal,
      onPedal: (id) => history.pushState(null, "", urlFor(v.id, id)),
    });
  }

  addEventListener("popstate", () => {
    show(viewFor(asked().get("effect")), asked().get("pedal")); // back/forward
  });
  show(viewFor(asked().get("effect")), asked().get("pedal"));
</script>
